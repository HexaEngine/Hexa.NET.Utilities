name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build

    - name: Copy Dlls
      run: |
        mkdir -p Hexa.NET.Utilities.Tests/bin/Debug/net8.0
        cp -r Hexa.NET.Utilities/runtimes Hexa.NET.Utilities.Tests/bin/Debug/net8.0/

    - name: Run tests
      run: dotnet test
